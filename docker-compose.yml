version: "3.9"

# POC-AMS Infrastructure Services
# Aligned with FRD Section 4 Technology Stack
# Authentication is handled by the custom RS256 JWT Auth Service (FRD Section 5.3)

services:
  # --- PostgreSQL 16 + pgvector (FRD Section 4.6) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: poc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: poc_ams
      POSTGRES_USER: poc_user
      POSTGRES_PASSWORD: poc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro

  # --- Redis 7 (FRD Section 4.7) ---
  # Session management, background jobs, event bus, token blacklisting
  redis:
    image: redis:7-alpine
    container_name: poc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- MinIO (FRD Section 4.8) ---
  # S3-compatible local object storage for data sovereignty
  minio:
    image: minio/minio:latest
    container_name: poc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: poc_minio_user
      MINIO_ROOT_PASSWORD: poc_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # --- LiveKit SFU (FRD Section 4.4) ---
  # Self-hosted WebRTC Selective Forwarding Unit for live classrooms
  livekit:
    image: livekit/livekit-server:latest
    container_name: poc_livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: --dev --bind 0.0.0.0

  # --- Ollama (FRD Section 4.5) ---
  # Local LLM runtime — zero internet access, data sovereignty compliant
  ollama:
    image: ollama/ollama:latest
    container_name: poc_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # --- Meilisearch (FRD Section 4.9) ---
  # Full-text search for Digital Library (Art. 9.5.11)
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: poc_meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: poc_meili_master_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  meilisearch_data:
